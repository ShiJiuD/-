# ============================================
# 应用配置模板
# 使用方法：复制此文件为 application.yml，填入真实值
# application.yml 已加入 .gitignore，不会被上传
# ============================================

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/dongdan_web?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: <你的数据库账号>
    password: "<你的数据库密码>"
  data:
    redis:
      host: localhost
      port: 6379
      database: 1
      password: "<你的Redis密码>"
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.dongdan.entity,com.dongdan.vo,com.dongdan.dto

server:
  port: 8080

# ===== Knife4j 接口文档 =====
knife4j:
  enable: true

dongdan:
  jwt:
    secret: <随机生成的JWT密钥>
    expiration: 86400000

  # ===== 阿里云 OSS 配置（图片上传）=====
  oss:
    endpoint: oss-cn-guangzhou.aliyuncs.com
    access-key-id: <你的阿里云AccessKey ID>
    access-key-secret: <你的阿里云AccessKey Secret>
    bucket-name: dongdan-gz
